name: cao-evolution
version: "1.1"
description: "CAO co-evolution — syncs hermes artifacts to shared pool via CaoBridge + git"
settings:
  hub_url:
    type: string
    default: "http://127.0.0.1:9889"
    description: "CAO Hub URL"
  agent_id:
    type: string
    default: ""
    description: "Agent identifier (auto-generated if empty)"
  push_skills:
    type: boolean
    default: true
    description: "Push hermes skills to Hub on session end"
  push_memory:
    type: boolean
    default: true
    description: "Push MEMORY.md entries as notes on session end"
  heartbeat_enabled:
    type: boolean
    default: true
    description: "Accept heartbeat prompts from Hub"
  our_evolution_enabled:
    type: boolean
    default: false
    description: "Use CAO judge/evals evolution (disabled — hermes has its own)"
env:
  CAO_GIT_REMOTE:
    description: "Git remote URL of Hub's evolution repo (required for sync)"
  CAO_CLIENT_DIR:
    description: "Agent-side clone path (default ~/.cao-evolution-client)"
