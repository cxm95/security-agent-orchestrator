<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.012);
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(25, 20, 25);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 4, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.1;
controls.update();

scene.add(new THREE.AmbientLight(0x556688, 2.0));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(20, 30, 10);
scene.add(dirLight);
const rimLight = new THREE.DirectionalLight(0x4A90D9, 0.5);
rimLight.position.set(-15, 10, -20);
scene.add(rimLight);
const fillLight = new THREE.DirectionalLight(0x8866aa, 0.3);
fillLight.position.set(0, 5, 20);
scene.add(fillLight);

// Ground grid
const gridHelper = new THREE.GridHelper(80, 40, 0x1a1a3a, 0x111128);
scene.add(gridHelper);
const groundGeo = new THREE.PlaneGeometry(80, 80);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x080818, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
scene.add(ground);

/* ── Helpers ── */
function makeLabel(text, size = 24, color = '#ffffff', bgColor = null) {
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d');
  const font = `bold ${size}px "Microsoft YaHei","PingFang SC",sans-serif`;
  ctx.font = font;
  const lines = text.split('\n');
  const lineH = size * 1.4;
  let maxW = 0;
  lines.forEach(l => { const w = ctx.measureText(l).width; if (w > maxW) maxW = w; });
  const w = maxW + 20, h = lineH * lines.length + 8;
  c.width = w; c.height = h;
  if (bgColor) { ctx.fillStyle = bgColor; ctx.fillRect(0, 0, w, h); }
  ctx.font = font; ctx.fillStyle = color; ctx.textBaseline = 'top';
  lines.forEach((l, i) => ctx.fillText(l, 10, 4 + i * lineH));
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
  sp.scale.set(w / 60, h / 60, 1);
  return sp;
}
function makeBox(w, h, d, color, opacity = 0.3) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const c = new THREE.Color(color);
  const bright = new THREE.Color().copy(c).lerp(new THREE.Color(0xffffff), 0.35);
  const mat = new THREE.MeshPhysicalMaterial({ color, transparent: true, opacity, roughness: 0.2, metalness: 0.1, side: THREE.DoubleSide, emissive: c, emissiveIntensity: 0.2 });
  const mesh = new THREE.Mesh(geo, mat);
  const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: bright, transparent: true, opacity: 1.0 }));
  mesh.add(edges);
  const outerGeo = new THREE.BoxGeometry(w + 0.06, h + 0.06, d + 0.06);
  const outerEdges = new THREE.LineSegments(new THREE.EdgesGeometry(outerGeo), new THREE.LineBasicMaterial({ color: bright, transparent: true, opacity: 0.3 }));
  mesh.add(outerEdges);
  return mesh;
}

const glowingObjects = [];
function addGlow(mesh, color, intensity = 0) {
  mesh.userData.glowColor = new THREE.Color(color);
  mesh.userData.glowIntensity = intensity;
  mesh.userData.baseOpacity = mesh.material.opacity;
  glowingObjects.push(mesh);
}

/* ── Hub Building ── */
const hubGroup = new THREE.Group();

const compartments = [
  { name: 'tasks/', desc: '任务定义 YAML', color: 0x4A90D9, x: -4, z: -3.5, y: 4.5 },
  { name: 'attempts/', desc: '评估记录 JSON', color: 0xF5A623, x: 0, z: -3.5, y: 4.5 },
  { name: 'notes/', desc: '知识笔记 .md', color: 0x7ED321, x: 4, z: -3.5, y: 4.5 },
  { name: 'notes/_synthesis/', desc: '综合笔记', color: 0x90EE90, x: -4, z: 0, y: 2.5 },
  { name: 'skills/', desc: '共享技能', color: 0x9B59B6, x: 0, z: 0, y: 2.5 },
  { name: 'heartbeat', desc: '心跳判定引擎', color: 0xE74C3C, x: 4, z: 0, y: 2.5 },
  { name: 'recall/BM25', desc: '倒排索引召回', color: 0x1ABC9C, x: -4, z: 3.5, y: 0.8 },
  { name: 'checkpoint', desc: 'git 提交锁', color: 0xF1C40F, x: 0, z: 3.5, y: 0.8 },
  { name: 'reports/', desc: '漏洞报告', color: 0xFF69B4, x: 4, z: 3.5, y: 0.8 },
];
const compMeshes = {};
compartments.forEach(c => {
  const box = makeBox(3, 2.2, 2.8, c.color, 0.5);
  box.position.set(c.x, c.y, c.z);
  hubGroup.add(box);
  addGlow(box, c.color);
  compMeshes[c.name] = box;
  const lbl = makeLabel(c.name, 22, '#' + c.color.toString(16).padStart(6, '0'));
  lbl.position.set(c.x, c.y + 1.5, c.z);
  hubGroup.add(lbl);
  const descLbl = makeLabel(c.desc, 16, '#bbbbbb');
  descLbl.position.set(c.x, c.y + 1.1, c.z);
  hubGroup.add(descLbl);
});
const hubTitle = makeLabel('Hub (CAO :9889)', 38, '#ffffff', 'rgba(10,10,26,0.7)');
hubTitle.position.set(0, 7, 0);
hubGroup.add(hubTitle);
const hubSub = makeLabel('evolution_routes.py', 24, '#8899bb');
hubSub.position.set(0, 6.3, 0);
hubGroup.add(hubSub);

/* ── Compartment Content Icons ── */
function addIcon(parent, geom, color, pos) {
  const m = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.7 }));
  m.position.copy(pos);
  parent.add(m);
  return m;
}
// tasks/: stacked document planes (back row y=4.5)
for (let i = 0; i < 3; i++) {
  addIcon(hubGroup, new THREE.BoxGeometry(1.2, 0.08, 0.9), 0x4A90D9, new THREE.Vector3(-4, 3.7 + i * 0.25, -3.5));
}
// attempts/: bar chart (back row y=4.5)
[0.5, 0.9, 0.65].forEach((h, i) => {
  addIcon(hubGroup, new THREE.BoxGeometry(0.3, h, 0.3), 0xF5A623, new THREE.Vector3(-0.4 + i * 0.4, 3.4 + h / 2, -3.5));
});
// notes/: tilted note pages (back row y=4.5)
for (let i = 0; i < 3; i++) {
  const n = addIcon(hubGroup, new THREE.BoxGeometry(0.8, 0.06, 0.6), 0x7ED321, new THREE.Vector3(4 + (i - 1) * 0.3, 3.7 + i * 0.2, -3.5));
  n.rotation.z = (i - 1) * 0.15;
}
// notes/_synthesis/: icosahedron (mid row y=2.5)
const synth = addIcon(hubGroup, new THREE.IcosahedronGeometry(0.45, 0), 0x90EE90, new THREE.Vector3(-4, 2.5, 0));
synth.userData.spin = true;
// skills/: octahedron (mid row y=2.5)
const skillGem = addIcon(hubGroup, new THREE.OctahedronGeometry(0.45, 0), 0x9B59B6, new THREE.Vector3(0, 2.5, 0));
skillGem.userData.spin = true;
// heartbeat: pulsing sphere (mid row y=2.5)
const hbSphere = addIcon(hubGroup, new THREE.SphereGeometry(0.35, 12, 8), 0xE74C3C, new THREE.Vector3(4, 2.5, 0));
hbSphere.userData.pulse = true;
// recall/BM25: torus (front row y=0.8)
const recallRing = addIcon(hubGroup, new THREE.TorusGeometry(0.35, 0.1, 8, 16), 0x1ABC9C, new THREE.Vector3(-4, 0.8, 3.5));
recallRing.rotation.x = Math.PI / 3;
recallRing.userData.spin = true;
// checkpoint: cylinder + ring (front row y=0.8)
addIcon(hubGroup, new THREE.CylinderGeometry(0.25, 0.25, 0.5, 8), 0xF1C40F, new THREE.Vector3(0, 0.6, 3.5));
const ckRing = addIcon(hubGroup, new THREE.TorusGeometry(0.35, 0.06, 8, 16), 0xF1C40F, new THREE.Vector3(0, 1.0, 3.5));
ckRing.rotation.x = Math.PI / 2;
// reports/: clipboard + flag (front row y=0.8)
addIcon(hubGroup, new THREE.BoxGeometry(0.8, 1.0, 0.08), 0xFF69B4, new THREE.Vector3(4, 0.5, 3.5));
addIcon(hubGroup, new THREE.BoxGeometry(0.3, 0.4, 0.06), 0xFF69B4, new THREE.Vector3(4.15, 1.2, 3.5));

const spinIcons = hubGroup.children.filter(c => c.userData && c.userData.spin);
const pulseIcons = hubGroup.children.filter(c => c.userData && c.userData.pulse);

scene.add(hubGroup);
/* ── Agent Buildings ── */
const agentDefs = [
  { name: 'OpenCode', bridge: 'Plugin Bridge', file: 'plugin/cao-bridge.ts', detail: 'session.idle → grader\nCAO_SCORE=0.72 正则提取', angle: -Math.PI / 6 },
  { name: 'Hermes', bridge: 'Hermes Plugin', file: 'hermes/__init__.py', detail: 'on_session_end → git push\npre_llm_call 注入心跳', angle: Math.PI * 5 / 6 },
  { name: 'Claude Code', bridge: 'CLAUDE.md + Hooks + MCP', file: 'claude-code/CLAUDE.md', detail: 'Hooks 生命周期\nMCP 配置 cao_bridge_mcp', angle: Math.PI / 2 + Math.PI / 6 },
];
const agents = [];
const AGENT_RADIUS = 22;
agentDefs.forEach(def => {
  const g = new THREE.Group();
  const x = Math.cos(def.angle) * AGENT_RADIUS, z = Math.sin(def.angle) * AGENT_RADIUS;
  g.position.set(x, 0, z);
  const bottom = makeBox(6, 2, 5, 0x3a4060, 0.4);
  bottom.position.y = 1;
  g.add(bottom);
  const middle = makeBox(6, 2.8, 5, 0x1e2845, 0.35);
  middle.position.y = 3.4;
  middle.material.depthWrite = false;
  g.add(middle);
  addGlow(middle, 0x4A90D9);
  const top = makeBox(6, 1.8, 5, 0x2e1e45, 0.35);
  top.position.y = 5.7;
  g.add(top);
  addGlow(top, 0x7ED321);
  const nl = makeLabel(`Agent: ${def.name}`, 34, '#ffffff', 'rgba(10,10,26,0.7)');
  nl.position.set(0, 7.5, 0);
  g.add(nl);
  const bl = makeLabel(def.bridge, 20, '#bbbbbb');
  bl.position.set(0, 0.2, 3.2);
  g.add(bl);
  const fl = makeLabel(def.file, 18, '#888888');
  fl.position.set(0, -0.4, 3.2);
  g.add(fl);
  ['Bridge 接入层', 'Agent LLM 核心', '自进化层'].forEach((t, i) => {
    const ll = makeLabel(t, 18, '#999999');
    ll.position.set(4.5, 1 + i * 2.3, 0);
    g.add(ll);
  });
  // Sub-modules inside middle layer (Agent LLM core)
  const subMods = [
    { name: 'notes', color: 0x7ED321, dx: -1.8 },
    { name: 'skills', color: 0x9B59B6, dx: 0 },
    { name: 'harness', color: 0xF5A623, dx: 1.8 },
  ];
  subMods.forEach(sm => {
    const sb = makeBox(1.5, 1.2, 1.5, sm.color, 0.45);
    sb.position.set(sm.dx, 3.4, 2.0);
    sb.renderOrder = 1;
    g.add(sb);
    const sl = makeLabel(sm.name, 14, '#' + sm.color.toString(16).padStart(6, '0'));
    sl.position.set(sm.dx, 4.2, 2.0);
    g.add(sl);
  });
  const cl = makeLabel('~/.cao-evolution-client/', 16, '#777777');
  cl.position.set(0, -1, 3.2);
  g.add(cl);
  const dl = makeLabel(def.detail, 16, '#aaaaaa');
  dl.position.set(0, 7, 3);
  g.add(dl);
  scene.add(g);
  agents.push({ group: g, bottom, middle, top, pos: new THREE.Vector3(x, 3.5, z), def });
});
/* ── Distant Agents (background) ── */
for (let i = 0; i < 5; i++) {
  const a = (i / 5) * Math.PI * 2 + 0.3;
  const r = 35 + Math.random() * 8;
  const b = makeBox(3, 3 + Math.random() * 2, 2.5, 0x2a3050, 0.2);
  b.position.set(Math.cos(a) * r, 2, Math.sin(a) * r);
  scene.add(b);
  const dl = makeLabel('Agent', 18, '#555');
  dl.position.set(Math.cos(a) * r, 4.5, Math.sin(a) * r);
  scene.add(dl);
}

/* ── Git Sync ground lines (dashed) ── */
agents.forEach(ag => {
  const pts = [new THREE.Vector3(0, 0.05, 0), new THREE.Vector3(ag.pos.x, 0.05, ag.pos.z)];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineDashedMaterial({ color: 0x334444, dashSize: 0.6, gapSize: 0.4, transparent: true, opacity: 0.5 });
  const line = new THREE.Line(geo, mat);
  line.computeLineDistances();
  scene.add(line);
});
const gsLabel = makeLabel('git sync (双向)', 18, '#556677');
gsLabel.position.set(11, 0.5, 11);
scene.add(gsLabel);
/* ── Particle Flow System ── */
class ParticleFlow {
  constructor(start, end, color, count = 6, arcH = 8) {
    this.active = false;
    const mid = new THREE.Vector3().lerpVectors(start, end, 0.5);
    mid.y += arcH;
    this.curve = new THREE.QuadraticBezierCurve3(start.clone(), mid, end.clone());
    const lPts = this.curve.getPoints(40);
    const lGeo = new THREE.BufferGeometry().setFromPoints(lPts);
    this.line = new THREE.Line(lGeo, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.12 }));
    scene.add(this.line);
    this.particles = [];
    const pColor = new THREE.Color(color);
    for (let i = 0; i < count; i++) {
      const sg = new THREE.SphereGeometry(0.28, 8, 6);
      const sm = new THREE.MeshBasicMaterial({ color: pColor });
      const mesh = new THREE.Mesh(sg, sm);
      const gg = new THREE.SphereGeometry(0.8, 8, 6);
      const gm = new THREE.MeshBasicMaterial({ color: pColor, transparent: true, opacity: 0.2 });
      mesh.add(new THREE.Mesh(gg, gm));
      mesh.visible = false;
      scene.add(mesh);
      this.particles.push({ mesh, t: i / count });
    }
  }
  setActive(v) {
    this.active = v;
    this.line.material.opacity = v ? 0.25 : 0.12;
    if (!v) this.particles.forEach(p => { p.mesh.visible = false; });
  }
  update(dt) {
    if (!this.active) return;
    this.particles.forEach(p => {
      p.t = (p.t + dt * 0.25) % 1;
      const pos = this.curve.getPoint(p.t);
      p.mesh.position.copy(pos);
      p.mesh.visible = true;
    });
  }
}

const hubCenter = new THREE.Vector3(0, 3, 0);
const hubTasks = new THREE.Vector3(-4, 4.5, -3.5);
const hubAttempts = new THREE.Vector3(0, 4.5, -3.5);
const hubNotes = new THREE.Vector3(4, 4.5, -3.5);
const hubSkills = new THREE.Vector3(0, 2.5, 0);
const hubHeart = new THREE.Vector3(4, 2.5, 0);
const hubRecall = new THREE.Vector3(-4, 0.8, 3.5);
/* ── Create Flows per Phase ── */
const taskFlows = agents.map(a => new ParticleFlow(hubTasks, a.pos, 0x4A90D9, 5, 7));
const scoreFlows = agents.map(a => new ParticleFlow(a.pos, hubAttempts, 0xF5A623, 5, 7));
const heartbeatFlows = agents.map(a => new ParticleFlow(hubHeart, a.pos, 0xE74C3C, 4, 9));
const noteFlows = agents.map(a => new ParticleFlow(a.pos, hubNotes, 0x7ED321, 4, 6));
const skillFlows = agents.map(a => new ParticleFlow(a.pos, hubSkills, 0x9B59B6, 3, 6));
const recallFlows = [
  ...agents.map(a => new ParticleFlow(a.pos, hubRecall, 0x1ABC9C, 3, 5)),
  ...agents.map(a => new ParticleFlow(hubRecall, a.pos, 0x1ABC9C, 3, 5)),
];
const allFlows = [...taskFlows, ...scoreFlows, ...heartbeatFlows, ...noteFlows, ...skillFlows, ...recallFlows];

/* ── Phase Descriptions ── */
const phaseData = [
  { title: 'Phase 1: 任务创建 → task.yaml 落盘 Hub',

/* ── Phase Management ── */
let currentPhase = 0, phaseTimer = 0;
const PHASE_DUR = 5;

function setGlow(mesh, intensity) {
  if (!mesh || !mesh.userData.glowColor) return;
  mesh.userData.glowIntensity = intensity;
}
function resetAllGlows() {
  glowingObjects.forEach(o => { o.userData.glowIntensity = 0; });
}
function updateGlows(time) {
  glowingObjects.forEach(o => {
    const i = o.userData.glowIntensity;
    if (i > 0) {
      const pulse = 0.5 + 0.5 * Math.sin(time * 4);
      const c = o.userData.glowColor;
      o.material.emissive = c;
      o.material.emissiveIntensity = i * (0.6 + 0.4 * pulse);
      o.material.opacity = 0.35 + 0.2 * i * pulse;
    } else {
      o.material.emissiveIntensity = 0;
      o.material.opacity = o.userData.baseOpacity;
    }
  });
}

function setPhase(idx) {
  currentPhase = idx;
  phaseTimer = 0;
  document.querySelectorAll('.phase-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  const pd = phaseData[idx];
  document.getElementById('phase-desc').innerHTML = `<h2>${pd.title}</h2>${pd.desc}`;
  allFlows.forEach(f => f.setActive(false));
  resetAllGlows();
  hidePhase8Overlay();
  switch (idx) {
    case 0:
      setGlow(compMeshes['tasks/'], 1);
      break;
    case 1:
      taskFlows.forEach(f => f.setActive(true));
      break;
    case 2:
      agents.forEach(a => setGlow(a.middle, 1));
      break;
    case 3:
      agents.forEach(a => setGlow(a.top, 1));
      break;
    case 4:
      scoreFlows.forEach(f => f.setActive(true));
      setGlow(compMeshes['attempts/'], 1);
      setGlow(compMeshes['checkpoint'], 0.8);
      setGlow(compMeshes['heartbeat'], 0.8);
      break;
    case 5:
      heartbeatFlows.forEach(f => f.setActive(true));
      setTimeout(() => { noteFlows.forEach(f => f.setActive(true)); skillFlows.forEach(f => f.setActive(true)); }, 1500);
      setGlow(compMeshes['notes/'], 0.7);
      setGlow(compMeshes['skills/'], 0.7);
      break;
    case 6:
      recallFlows.forEach(f => f.setActive(true));
      setGlow(compMeshes['recall/BM25'], 1);
      break;
    case 7:
      // Phase 8: Data overlay on bottom half, 3D scene runs in background
      allFlows.forEach(f => f.setActive(true));
      showPhase8Overlay();
      break;
  }
}

const p8roundEl = document.getElementById('phase8-round');
const p8ctx = p8canvas.getContext('2d');
let p8animT = 0, p8animId = null, p8lastTs = 0;

// Each round holds for this many seconds, then next point appears
const P8_ROUND_SEC = 3;  // 3s per round transition
const P8_HOLD_SEC = 6;   // Round 3 holds 6s before looping
// Total cycle: 3*4 + 6 = 18s (Batch0:3s, R1:3s, R2:3s, R3:3s+6s hold)

      { rank: 4, agent: 'opencode-1',    task: 'bluetooth', score: 65, type: 'open' },
      { rank: 5, agent: 'claude-code-4', task: 'wifi_hal', score: 62, type: 'closed' },
      { rank: 6, agent: 'opencode-4',    task: 'audio_srv', score: 55, type: 'open' },
      { rank: 7, agent: 'claude-code-2', task: 'nfc_svc', score: 50, type: 'closed' },

function hidePhase8Overlay() {
  p8overlay.style.display = 'none';
  p8roundEl.style.display = 'none';
  if (p8animId) { cancelAnimationFrame(p8animId); p8animId = null; }
}

function showPhase8Overlay() {
  p8overlay.style.display = 'block';
  p8roundEl.style.display = 'block';
  p8animT = 0;
  p8lastTs = 0;
  resizeP8Canvas();
  animateP8();
}

function resizeP8Canvas() {
  const r = window.devicePixelRatio || 1;
  p8canvas.width = p8overlay.clientWidth * r;
  p8canvas.height = p8overlay.clientHeight * r;
  p8ctx.setTransform(r, 0, 0, r, 0, 0);
}

function animateP8() {
  const now = performance.now();
  if (p8lastTs) {
    const dtSec = (now - p8lastTs) / 1000;
    p8animT += dtSec;
  }
  p8lastTs = now;
  const totalCycle = P8_ROUND_SEC * 4 + P8_HOLD_SEC;
  if (p8animT > totalCycle) p8animT -= totalCycle;

  // Convert real time to logical round index (0-3) for drawing
  // Each of the 4 transitions takes P8_ROUND_SEC, then hold
  const logicalT = p8animT / P8_ROUND_SEC; // how many rounds elapsed
  drawPhase8(logicalT);
  if (currentPhase === 7) p8animId = requestAnimationFrame(animateP8);
}

function drawPhase8(t) {
  const W = p8overlay.clientWidth, H = p8overlay.clientHeight;
  const ctx = p8ctx;
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(10,10,26,0.72)';
  ctx.fillRect(0, 0, W, H);
  const fadeH = 30;
  const fade = ctx.createLinearGradient(0, 0, 0, fadeH);
  fade.addColorStop(0, 'rgba(10,10,26,0)');
  fade.addColorStop(1, 'rgba(10,10,26,0.72)');
  ctx.fillStyle = fade;
  ctx.fillRect(0, 0, W, fadeH);

  const font = s => `${s}px "Microsoft YaHei","PingFang SC",sans-serif`;

  // visiblePts: how many curve points are drawn (1=Batch0 only, 4=all)
  // Synced: each round adds one point, leaderboard switches at the same moment
  const visiblePts = Math.min(4, Math.floor(t) + 1);
  // roundIdx for leaderboard: 0/1/2 mapping to the latest non-zero round
  const lbIdx = Math.max(0, Math.min(2, visiblePts - 2));

  // Round indicator
  if (visiblePts <= 1) {
    p8roundEl.textContent = 'Batch 0 — 基线';
  } else {
    p8roundEl.textContent = 'Round ' + (visiblePts - 1) + ' / 3';
  }

  const midX = W / 2;
  const pad = 30;

  const chartL = pad, chartT = 16, chartW = midX - pad * 2, chartH = H - 30;
  drawScoreCurves(ctx, chartL, chartT, chartW, chartH, visiblePts, font);

  const lbL = midX + pad, lbT = 16, lbW = midX - pad * 2, lbH = H - 30;
  drawLeaderboard(ctx, lbL, lbT, lbW, lbH, visiblePts, lbIdx, font);
}

function drawScoreCurves(ctx, x, y, w, h, visiblePts, font) {
  const d = p8data;
  ctx.font = font(18); ctx.fillStyle = '#4A90D9';
  ctx.fillText('平均分趋势', x, y + 4);

  const plotX = x + 55, plotY = y + 32, plotW = w - 65, plotH = h - 80;

  // Axes
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(plotX, plotY); ctx.lineTo(plotX, plotY + plotH); ctx.lineTo(plotX + plotW, plotY + plotH); ctx.stroke();

  // Y axis
  ctx.font = font(14); ctx.fillStyle = '#777'; ctx.textAlign = 'right';
  for (let s = 0; s <= 100; s += 25) {
    const ly = plotY + plotH - (s / 100) * plotH;
    ctx.fillText(s.toString(), plotX - 8, ly + 5);
    if (s > 0) { ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.beginPath(); ctx.moveTo(plotX, ly); ctx.lineTo(plotX + plotW, ly); ctx.stroke(); }
  }
  ctx.textAlign = 'left';

  // X axis labels (4 points)
  const stepX = plotW / (d.xLabels.length - 1);
  d.xLabels.forEach((b, i) => {
    const bx = plotX + i * stepX;
    ctx.font = font(14); ctx.fillStyle = i < visiblePts ? '#ccc' : '#444';
    ctx.textAlign = 'center'; ctx.fillText(b, bx, plotY + plotH + 20); ctx.textAlign = 'left';
  });

  const drawLine = (scores, color) => {
    const pts = scores.slice(0, visiblePts).map((s, i) => ({ x: plotX + i * stepX, y: plotY + plotH - (s / 100) * plotH }));
    if (pts.length === 0) return;
    ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.beginPath();
    pts.forEach((p, i) => { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
    ctx.stroke();
    pts.forEach((p, i) => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill();
      if (scores[i] > 0) {
        ctx.font = font(16); ctx.fillStyle = color; ctx.textAlign = 'center';
        ctx.fillText(scores[i].toString(), p.x, p.y - 16); ctx.textAlign = 'left';
      }
    });
  };
  drawLine(d.openSource.avg, d.openSource.color);
  drawLine(d.closedSource.avg, d.closedSource.color);

  // Pulse on the latest point
  if (visiblePts > 1) {
    const pi = visiblePts - 1;
    const pulse = 8 + 3 * Math.sin(performance.now() * 0.006);
    [d.openSource, d.closedSource].forEach(src => {
      const px = plotX + pi * stepX;
      const py = plotY + plotH - (src.avg[pi] / 100) * plotH;
      ctx.beginPath(); ctx.arc(px, py, pulse, 0, Math.PI * 2);
      ctx.strokeStyle = src.color; ctx.lineWidth = 2; ctx.globalAlpha = 0.5; ctx.stroke(); ctx.globalAlpha = 1;
    });
  }

  // Legend
  const legY = plotY + plotH + 38;
  ctx.font = font(14);
  ctx.fillStyle = d.closedSource.color; ctx.fillRect(plotX, legY, 14, 14);
  ctx.fillText(d.closedSource.name, plotX + 20, legY + 12);
  ctx.fillStyle = d.openSource.color; ctx.fillRect(plotX + 210, legY, 14, 14);
  ctx.fillText(d.openSource.name, plotX + 230, legY + 12);
}

function drawLeaderboard(ctx, x, y, w, h, visiblePts, lbIdx, font) {
  const d = p8data;
  const lb = d.leaderboards[lbIdx];

  ctx.font = font(18); ctx.fillStyle = '#9B59B6';
  ctx.fillText('排行榜 Top 8', x, y + 4);

  // Round badge synced with curve
  ctx.font = font(14); ctx.fillStyle = '#888';
  const tag = visiblePts <= 1 ? '— 等待 Round 1' : '— Round ' + (visiblePts - 1);
  ctx.fillText(tag, x + 155, y + 4);

  const rowH = (h - 52) / 9;
  const ty = y + 38;

  // Header
  ctx.font = font(14); ctx.fillStyle = '#777';
  ctx.fillText('#', x, ty); ctx.fillText('Agent', x + 26, ty);
  ctx.fillText('Task', x + w * 0.45, ty); ctx.fillText('Score', x + w - 60, ty);

  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(x, ty + 8); ctx.lineTo(x + w, ty + 8); ctx.stroke();

  // Show nothing at Batch 0, all rows at once otherwise
  if (visiblePts <= 1) {
    ctx.font = font(15); ctx.fillStyle = '#555'; ctx.textAlign = 'center';
    ctx.fillText('等待第一轮结果...', x + w / 2, ty + h * 0.35);
    ctx.textAlign = 'left';
    return;
  }

  lb.forEach((row, i) => {
    const ry = ty + (i + 1) * rowH + 6;
    const isOpen = row.type === 'open';
    const agentColor = isOpen ? '#F5A623' : '#4A90D9';

    ctx.font = font(15);
    ctx.fillStyle = '#888'; ctx.fillText(row.rank.toString(), x, ry);
    ctx.fillStyle = agentColor;
    ctx.fillText(row.agent, x + 26, ry);
    ctx.fillStyle = '#bbb'; ctx.fillText(row.task, x + w * 0.45, ry);

    // Score bar
    const barMaxW = 60, barH2 = 14;
    const barFill = (row.score / 100) * barMaxW;
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(x + w - 75, ry - 11, barMaxW, barH2);
    ctx.fillStyle = isOpen ? 'rgba(245,166,35,0.5)' : 'rgba(74,144,217,0.5)';
    ctx.fillRect(x + w - 75, ry - 11, barFill, barH2);
    ctx.fillStyle = '#fff'; ctx.font = font(14);
    ctx.fillText(row.score.toString(), x + w - 75 + barMaxW + 6, ry);
  });
}

/* ── Animation Loop ── */
const clock = new THREE.Clock();
let autoPlay = true;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const time = clock.getElapsedTime();
  controls.update();
  if (autoPlay) {
    phaseTimer += dt;
    const dur = currentPhase === 7 ? 20 : PHASE_DUR; // Phase 8: one full cycle ~18s
    if (phaseTimer >= dur) setPhase((currentPhase + 1) % 8);
  }
  allFlows.forEach(f => f.update(dt));
  updateGlows(time);
  spinIcons.forEach(o => { o.rotation.y += dt * 0.8; });
  pulseIcons.forEach(o => { const s = 0.8 + 0.3 * Math.sin(time * 3); o.scale.set(s, s, s); });
  renderer.render(scene, camera);
}

/* ── Event Handlers ── */
const toggleBtn = document.getElementById('auto-toggle');
toggleBtn.addEventListener('click', () => {
  autoPlay = !autoPlay;
  toggleBtn.textContent = autoPlay ? '▶' : '⏸';
  toggleBtn.classList.toggle('paused', !autoPlay);
  if (autoPlay) phaseTimer = 0;
});
document.querySelectorAll('.phase-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    setPhase(parseInt(btn.dataset.phase));
    phaseTimer = 0;
  });
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (currentPhase === 7) resizeP8Canvas();
});

/* ── Init ── */
document.getElementById('loading').style.display = 'none';
setPhase(0);
animate();
